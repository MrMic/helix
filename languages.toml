# Properties files (application.properties, etc.)
[[language]]
name = "properties"
scope = "source.properties"
file-types = [
    "properties",
    "application.properties",
    "application-dev.properties",
    "application-prod.properties",
    "application-test.properties",
    "bootstrap.properties",
    "messages.properties"
]
language-servers = ["properties-ls"]
## comment-token = "#"
indent = { tab-width = 2, unit = "  " }

[language-server.properties-ls]
command = "vscode-properties-language-server"
args = ["--stdio"]

# YAML files (application.yml, etc.)
[[language]]
name = "yaml"
file-types = [
    "yml", "yaml",
    "application.yml", "application.yaml",
    "application-*.yml", "application-*.yaml"
]
language-servers = ["yaml-language-server"]

[language-server.yaml-language-server]
command = "yaml-language-server"
args = ["--stdio"]

[language-server.yaml-language-server.config.yaml]
schemas = { "https://json.schemastore.org/spring-boot-properties" = "application*.yml" }
completion = true
validate = true


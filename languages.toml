## VUE
[language-server.vue-language-server]
command = "vue-language-server"
args = ["--stdio"]

[[language]]
name = "vue"
auto-format = true
file-types = ["vue"]
injection-regex = "vue"
roots = ["package.json"]
scope = "text.html.vue"
formatter = { command = "prettier", args = ["--parser", "vue"] }
language-servers = ["vue-language-server", "gpt"]


## JAVA - Optimized for Quarkus and Mockito
[[language]]
name = "java"
language-servers = ["jdtls", "spring-boot-ls"]
auto-format = true
formatter = { command = "google-java-format", args = ["-"] }

[language-server.jdtls]
command = "/home/mic/.local/share/LazyVim/mason/bin/jdtls"
args = [
    "-configuration", "/home/mic/.cache/jdtls/config",
    "-data", "/home/mic/.cache/jdtls/workspace",
    "--jvm-arg=-javaagent:/home/mic/.local/share/LazyVim/mason/packages/jdtls/lombok.jar"
]

[language-server.jdtls.config]
# Quarkus-specific settings
java.configuration.runtimes = [
    { name = "JavaSE-17", path = "/home/mic/.sdkman/candidates/java/current" },
    { name = "JavaSE-21", path = "/home/mic/.sdkman/candidates/java/current", default = true }
]

# Import organization - prioritize Quarkus and Mockito
java.completion.importOrder = [
    "java",
    "javax",
    "jakarta",
    "io.quarkus",
    "org.eclipse.microprofile",
    "org.junit.jupiter",
    "org.mockito",
    "org.assertj",
    "",
    "#"
]

# Enable static imports for Mockito and JUnit
java.completion.favoriteStaticMembers = [
    "org.junit.jupiter.api.Assertions.*",
    "org.mockito.Mockito.*",
    "org.mockito.ArgumentMatchers.*",
    "org.mockito.BDDMockito.*",
    "org.assertj.core.api.Assertions.*",
    "io.restassured.RestAssured.*"
]

# Quarkus dev mode support
java.autobuild.enabled = true
java.maxConcurrentBuilds = 2

# Better code completion for annotations
java.completion.filteredTypes = [
    "com.sun.*",
    "sun.*",
    "jdk.*"
]

# Enable faster builds for Quarkus
java.import.gradle.wrapper.enabled = true
java.import.maven.enabled = true

# Code generation preferences for Quarkus/Mockito
java.codeGeneration.hashCodeEquals.useJava7Objects = true
java.codeGeneration.useBlocks = true
java.codeGeneration.generateComments = true

# Quarkus-specific ignore patterns
java.project.resourceFilters = ["node_modules", ".git", "target", "build"]

[language-server.spring-boot-ls]
command = "/home/mic/.sdkman/candidates/java/current/bin/java"
args = [
    "-XX:TieredStopAtLevel=1",
    "-Xmx1G",
    "-XX:+UseZGC",
    "-Dsts.lsp.client=vscode",
    "-Dsts.log.file=/dev/null",
    "-jar",
    "/home/mic/.local/share/nvChad/mason/packages/vscode-spring-boot-tools/extension/language-server/spring-boot-language-server-2.2.0-SNAPSHOT-exec.jar"
]

[language-server.jdtls.config.java.inlayHints]
parameterNames.enabled = "all"  # Show parameter names


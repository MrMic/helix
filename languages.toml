# language.toml config for inlay hit

[language-server.gpt]
command = "helix-gpt"
## args = ["--handler", "copilot"]
## args = ["--handler", "codeium"]

## RUST
[language-server.rust-analyzer.config]
check.command = "clippy"

[[language]]
name = "rust"
auto-format = true
language-servers = ["rust-analyzer", "gpt"]


## GO

[language-server.gopls]
command = "gopls"
config = { "gofumpt" = true, "local" = "goimports", "semanticTokens" = true, "staticcheck" = true, "verboseOutput" = true, "analyses" = { "nilness" = true, unusedparams = true, unusedwrite = true, useany = true }, usePlaceholders = true, completeUnimported = true, hints = { "assignVariableType" = true, "compositeLiteralFields" = true, "compositeLiteralTypes" = true, "constantValues" = true, "functionTypeParameters" = true, "parameterNames" = true, "rangeVariableTypes" = true } }

[[language]]
name = "go"
roots = ["go.work", "go.mod"]
auto-format = true
comment-token = "//"
language-servers = ["gopls", "gpt"]
formatter = { command = "goimports" }

## CSS
[language-server.css-language-server]
command = "vscode-css-language-server"
args = ["--stdio"]

[[language]]
name = "css"
formatter = { command = 'prettier', args = ["--parser", "css"] }
auto-format = true
language-servers = ["css-language-server", "gpt"]


## HTML
[[language]]
name = "html"
scope = "text.html.basic"
file-types = ["html", "htm", "xhtml"]
roots = ["package.json", ".git"]
indent = { tab-width = 2, unit = "  " }
language-servers = ["vscode-html-language-server", "emmet-ls", "gpt"]
auto-format = true

[language-server.vscode-html-language-server]
command = "vscode-html-language-server"
args = ["--stdio"]

# Option 1: Use proper TOML table syntax (RECOMMENDED)
[language-server.vscode-html-language-server.config]
provideFormatter = true

[language-server.vscode-html-language-server.config.embeddedLanguages]
css = true
javascript = true


## EMMET LSP
[language-server.emmet-ls]
command = "emmet-language-server"
args = ["--stdio"]


## TYPESCRIPT
[language-server.angular]
command = "npx"
args = [
  "ngserver",
  "--stdio",
  "--tsProbeLocations",
  "/home/mic/.nvm/versions/node/v20.13.1/lib/node_modules/typescript/lib, ./node_modules",
  "--ngProbeLocations",
  "/home/mic/.nvm/versions/node/v20.13.1/lib/node_modules/@angular/language-server/bin, ./node_modules",
]

[language-server.eslint]
command = "vscode-eslint-language-server"
args = ["--stdio"]

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]
# config = { hostinfo = "helix", inlayHintsOptions = { "includeInlayFunctionParameterTypeHints" = true } }

[[language]]
name = "typescript"
# file-types=["tsx", "ts"]
roots = ["tsconfig.json"]
formatter = { command = "biome", args = [
  "format",
  "--stdin-file-path",
  "*.ts",
] }
auto-format = true
language-servers = ["typescript-language-server", "angular", "eslint", "gpt"]


## JAVASCRIPT
[[language]]
name = "javascript"
file-types = ["jsx", "js"]
formatter = { command = 'prettier', args = ["--parser", "typescript"] }
auto-format = true
language-servers = ["typescript-language-server", "gpt"]


## JSON
[[language]]
name = "json"
formatter = { command = 'prettier', args = ["--parser", "json"] }
auto-format = true


## LUA
[[language]]
name = "lua"


## PHP
[language-server.phpactor]
command = "phpactor"
args = ["language-server"]

[language-server.intelephense]
command = "intelephense"
args = ["--stdio"]

[[language]]
name = "php"
language-servers = ["intelephense", "phpactor", "gpt"]


## PYTHON
[language-server.pyright.config.python.analysis]
